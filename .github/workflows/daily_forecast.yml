# Daily forecast for day D+1, issued before the SDAC gate closure
# (12:00 CET/CEST). GitHub's scheduled runners are best-effort and in
# practice fire several hours late, so the cron is set deliberately early to
# pre-compensate: with the typical ~4 h delay these land ~08:00-09:00 UTC,
# just after the day-ahead load/RES forecasts publish (~10:00 local) and
# well before gate closure. Two times keep one run in the right window across
# DST. Runs are idempotent (newest forecast for a day wins); make_forecast
# routes any missing same-day input through LightGBM's NaN handling if a run
# happens to land very early.
name: Daily forecast

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e .

      # ENTSO-E raw chunks: a warm cache means only the current month is
      # refetched; a cold cache rebuilds the full 3-year history (~5 min)
      - uses: actions/cache@v4
        with:
          path: data/raw
          key: entsoe-raw-${{ github.run_id }}
          restore-keys: |
            entsoe-raw-

      - name: Generate forecast
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        run: python scripts/make_forecast.py

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add forecasts/
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "Daily forecast $(date -u +%F)"
          git pull --rebase origin main
          git push
